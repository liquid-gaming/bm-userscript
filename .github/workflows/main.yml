name: Minify and Update

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

permissions:
  contents: write

jobs:
  minify-and-update:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Auto-increment version in code.js
        run: |
          # Expect first line like: const version = "12.06";
          version=$(sed -n '1s/.*const version = "\([0-9]\+\)\.\([0-9]\+\)".*/\1.\2/p' code.js)

          if [ -z "$version" ]; then
            echo "Could not parse version from code.js first line"
            exit 1
          fi

          major=${version%%.*}
          minor=${version#*.}

          major=$((10#$major))
          minor=$((10#$minor))

          if [ "$minor" -ge 99 ]; then
            major=$((major+1))
            minor=0
          else
            minor=$((minor+1))
          fi

          new_version=$(printf "%d.%02d" "$major" "$minor")

          sed -i '1s|^.*$|const version = "'"$new_version"'";|' code.js

          echo "NEW_VERSION=$new_version" >> "$GITHUB_ENV"
          echo "Bumped version to $new_version"

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build minified code
        run: npx uglify-js code.js -o code.min.js

      - name: Update bm-toolkit-desktop.user.js
        run: |
          test -f bm-toolkit-desktop.user.js || {
            echo "bm-toolkit-desktop.user.js not found"
            exit 1
          }

          python3 <<'PY'
          from pathlib import Path
          import os

          user_file = Path("bm-toolkit-desktop.user.js")
          min_file = Path("code.min.js")
          new_version = os.environ["NEW_VERSION"]

          lines = user_file.read_text().splitlines()
          minified = min_file.read_text().strip()

          # Replace line 16, 1-indexed
          lines[15] = minified

          # Replace @version on line 4, 1-indexed
          lines[3] = f"// @version {new_version}"

          user_file.write_text("\n".join(lines) + "\n")
          min_file.unlink()
          PY

      - name: Detect changes
        id: changes
        run: |
          git add code.js bm-toolkit-desktop.user.js

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected."
          fi

      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          git commit -m "Build .user.js and bump to v$NEW_VERSION"

      - name: Push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git push