name: Update Userscript

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

permissions:
  contents: write

jobs:
  update-userscript:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Auto-increment version in code.js
        run: |
          version=$(sed -n '1s/.*const version = "\([0-9]\+\)\.\([0-9]\+\)".*/\1.\2/p' code.js)

          if [ -z "$version" ]; then
            echo "Could not parse version from code.js first line"
            exit 1
          fi

          major=${version%%.*}
          minor=${version#*.}
          major=$((10#$major))
          minor=$((10#$minor))

          if [ "$minor" -ge 99 ]; then
            major=$((major+1))
            minor=0
          else
            minor=$((minor+1))
          fi

          new_version=$(printf "%d.%02d" "$major" "$minor")

          sed -i '1s|^.*$|const version = "'"$new_version"'";|' code.js
          sed -i 's|^// @version .*|// @version '"$new_version"'|' header.user.js

          echo "NEW_VERSION=$new_version" >> "$GITHUB_ENV"

      - name: Build bm-toolkit-desktop.user.js
        run: |
          cat header.user.js code.js > bm-toolkit-desktop.user.js

      - name: Detect changes
        id: changes
        run: |
          git add code.js header.user.js bm-toolkit-desktop.user.js

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git commit -m "Update userscript and bump to v$NEW_VERSION"

      - name: Push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git push